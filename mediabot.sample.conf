# mb378-R1: safe active defaults used directly by the configure wizard.
[openai]
# Optional OpenAI API key used by ChatGPT/tellme integrations.
# Leave empty to disable API-backed OpenAI features.
API_KEY=

# Runtime settings for the tellme/chatGPT command.
# Values are guarded in code: invalid or missing values fall back to defaults.
API_URL=https://api.openai.com/v1/chat/completions
MODEL=gpt-4o-mini
# Optional: used if MODEL is forbidden/unavailable (400/403/404) or hits a transient 429 rate limit.
# It is deliberately NOT used for insufficient_quota: that requires API billing/credits, not another model.
FALLBACK_MODEL=
SYSTEM_PROMPT=You always answer in a helpful and serious way, precise and never start your answer with « Oh là là » when the answer is in French. Always respond using a maximum of 10 lines of text and line-based. There is one chance on two the answer contains emojis.
TEMPERATURE=0.7
# HTTP timeout for both public tellme/chatGPT calls and Owner diagnostics, in seconds (5..60).
TIMEOUT=20
MAX_TOKENS=400
MAX_PRIVMSG=4
WRAP_BYTES=400
SLEEP_US=750000

# IRC admin command:
#   openai help
#   openai status
#   openai defaults
#   openai profiles
#   openai profile dev
#   openai profile compact
#   openai profile safe
#   openai profile default
#   openai test
#   openai diagnose
#   openai models
#   openai models gpt
#   openai models gpt-5
#   openai test Reply with exactly OK
#   openai test/diagnose also tries FALLBACK_MODEL on 400/403/404 or a transient 429 rate limit.
#   openai explain model
#   openai explain system_prompt
#   openai explain fallback_model
#   openai set model gpt-4o-mini
#   openai set fallback_model gpt-4o-mini
#   openai set temperature 0.6
#   openai set system_prompt You answer briefly and clearly for IRC.
#   openai set max_tokens 700
#   openai set max_privmsg 5
#   openai set wrap_bytes 360
#   openai set sleep_us 500000
#   openai set timeout 20
#   openai reset model
#   openai reset system_prompt
#   openai reset fallback_model
#   openai reset timeout
#
# Security:
#   API_KEY is intentionally not changeable from IRC.
#   Keep secrets in mediabot.conf only; never commit real keys.
#
# Channel enablement:
#   tellme/chatGPT still requires the per-channel +chatGPT chanset.
#   Example: chanset #channel +chatGPT
#
# Practical notes:
#   gpt-4o-mini is the recommended default for IRC cost/speed.
#   gpt-4o gives better answers but costs more.
#   GPT-5 access depends on your OpenAI API project and may return 403.

# Admin/runtime notes:
# - The IRC command "openai" is Owner-only and shows these effective settings.
# - It never displays API_KEY.
# - The public tellme command still requires the per-channel +chatGPT chanset.
# - Enable it with: chanset #channel +chatGPT
# - Recommended default for IRC usage: MODEL=gpt-4o-mini
# - gpt-4o gives better answers but costs more; GPT-5 access depends on your API project.

[mysql]
MAIN_PROG_DBUSER=mediabot
MAIN_PROG_DBHOST=localhost
MAIN_PROG_DBPASS=
MAIN_PROG_DDBNAME=mediabot
MAIN_PROG_DBPORT=3306
# Database session charset mode: utf8mb4, latin1, or off.
# utf8mb4 is the recommended default for new installations.
CHARSET_MODE=utf8mb4

[hailo]
HAILO_LEARN_MAX_WORDS=20
HAILO_LEARN_MIN_WORDS=3
# mb370-B1: taux de chatter HailoChatter adaptatif au débit du canal.
# Le ratio par canal (table HAILO_CHANNEL, réglé via le chanset HailoChatter)
# reste la CIBLE en % ; ces clés modulent la probabilité effective selon
# l'activité récente (anti-flood). Défauts = comportement de référence.
# Fenêtre de mesure du débit, en secondes :
HAILO_CHATTER_RATE_WINDOW=60
# Nombre de messages/fenêtre au-delà duquel on commence à brider :
HAILO_CHATTER_REFERENCE_MSGS=10
# Plancher du facteur de bridage, en % (10 => proba mini = ratio * 10%) :
HAILO_CHATTER_MIN_FACTOR_PCT=10

[metrics]
# Prometheus exporter. Disabled by default.
# When enabled, metrics are exposed on http://METRICS_BIND:METRICS_PORT/metrics
METRICS_ENABLED=0
METRICS_BIND=127.0.0.1
METRICS_PORT=9108

[radio]
# mb397-R1: master switch reported by "features" (1/yes/true/on = on).
# Default when absent: off. Documented so a fresh configure exposes it.
#ENABLED=0
YOUTUBEDL_INCOMING=/tmp
# Safe default: play uses the local MP3 cache only. Set to 1 only on instances
# where yt-dlp downloads are intentionally allowed and supervised.
RADIO_DOWNLOAD_ENABLED=0
YTDLP_PATH=/usr/bin/yt-dlp
# Maximum yt-dlp runtime in seconds before Mediabot stops the download.
YTDLP_TIMEOUT=180
# Optional cookies file for yt-dlp. Keep this file outside the repository.
YTDLP_COOKIES_FILE=
YTDLP_REMOTE_COMPONENTS=ejs:github

# Liquidsoap telnet control used by radioqueue/radiopush/radioskip/radioflush.
LIQUIDSOAP_TELNET_HOST=127.0.0.1
LIQUIDSOAP_TELNET_PORT=1235
LIQUIDSOAP_QUEUE_ID=mediabot_queue

# Icecast JSON status integration used by song/listeners/radiostatus/radiomounts.
# STATUS_BASE_URL should usually be local/private.
# PUBLIC_BASE_URL is what users should open in their browser/player.
RADIO_ICECAST_STATUS_BASE_URL=http://127.0.0.1:8000
RADIO_ICECAST_PUBLIC_BASE_URL=http://example.com:8000
RADIO_ICECAST_TIMEOUT=5
RADIO_ICECAST_PRIMARY_MOUNT=/radio.mp3

[connection]
CONN_NICK=mediabot
CONN_SERVER_NETWORK=Undernet
CONN_IRCNAME=mediabot
CONN_NETWORK_TYPE=1
CONN_USERMODE=+iw
CONN_USERNAME=mediabot
# Optional IRC server password. Leave empty when not needed.
CONN_PASS=
# Optional local source IP for outgoing IRC connections.
# Leave empty unless you really need to bind the client socket.
# Example:
#CONN_BIND_IP=192.0.2.42
CONN_BIND_IP=

[undernet]
UNET_CSERVICE_USERNAME=
UNET_CSERVICE_PASSWORD=
UNET_CSERVICE_LOGIN=x@channels.undernet.org

[main]
# Default language used by language-aware commands.
# DEFINE_LANG is used by dictionary/definition lookups.
MAIN_PROG_NAME=Mediabot
MAIN_PROG_MAXLEN=400
# IRC command prefix. Example: !help
MAIN_PROG_CMD_CHAR=!
MAIN_PROG_URL=http://www.domain.tld/mediabot
MAIN_PROG_BIRTHDATE=1556692931
MAIN_PID_FILE=/home/mediabot/mediabot_v3/mediabot.pid
# Delay in seconds before reconnecting after connection loss (5-600, default 30)
RECONNECT_DELAY=30
MAIN_PROG_QUIT_MSG=So long and thanks for all the fish !
MAIN_LOG_FILE=/home/mediabot/mediabot_v3/mediabot.log
MAIN_CHANNEL_NICKLIST_REFRESH_INTERVAL=300
MAIN_PROG_LIVE=1
MAIN_PROG_DEBUG=0

# Retention period for channel log maintenance, in days.
# Used by scheduled cleanup tasks. Default in code: 90.
CHANNEL_LOG_RETENTION_DAYS=90

# Local hour (0-23) at which the daily "on this day" digest is posted to
# channels that enabled the +OnThisDayDigest chanset. Set to -1 to disable
# the digest task entirely. Default in code: 12.
ONTHISDAY_DIGEST_HOUR=12

# Retention period for USER seen/activity cleanup, in days.
# Used by scheduled cleanup tasks. Default in code: 180.
USER_SEEN_RETENTION_DAYS=180

# !recap — channel catch-up summary (mb472). All optional; safe defaults in code.
# RECAP_MAX_H      : hard cap on the recap window, in hours (default 24).
# RECAP_DEFAULT_H  : window used when no explicit one is given and the caller
#                    has no known last-seen time, in hours (default 6).
# RECAP_MAX_ROWS   : max CHANNEL_LOG lines read per recap (default 2000).
# RECAP_COOLDOWN_S : per-nick cooldown between recaps, in seconds (default 30).
RECAP_MAX_H=24
RECAP_DEFAULT_H=6
RECAP_MAX_ROWS=2000
RECAP_COOLDOWN_S=30

# "Did you mean?" command suggestion (mb475). Per-channel opt-out via the
# +DidYouMean chanset (on by default). DIDYOUMEAN_COOLDOWN_S: per-channel
# cooldown between suggestions, in seconds (default 15; 0 disables the delay).
DIDYOUMEAN_COOLDOWN_S=15

# Owner-only exec command timeout, in seconds.
# Prevents a blocking shell command from hanging the IRC handler.
# Minimum runtime clamp: 1s, maximum runtime clamp: 30s.
EXEC_TIMEOUT_SECONDS=8
MAIN_PROG_INITIAL_TRIGGER=1
YOUTUBE_APIKEY=
NICK_TRIGGER=1
# Optional random quote timer, in seconds.
# Disabled by default for fresh installs.
#RANDOM_QUOTE=5400
PARTYLINE_PORT=23456
# Public IPv4 address used when the bot offers DCC CHAT sessions.
# Required for Eggdrop-style: /ctcp <botnick> CHAT
#DCC_PUBLIC_IP=203.0.113.10

# Optional low-level DCC/CTCP diagnostics.
#
# Keep disabled unless debugging DCC client payloads.
# When enabled with debug level 4, Mediabot may log CTCP hints and raw payloads
# in hexadecimal form.
#
DCC_DEBUG_HINTS=0

# Dangerous partyline eval command. Disabled by default.
# Keep disabled unless you fully trust the partyline users.
PARTYLINE_EVAL_ENABLED=0
PARTYLINE_EVAL_TIMEOUT_SECONDS=5
PARTYLINE_STATUS_JSON=/home/mediabot/mediabot_v3/run/partyline_sessions.json

# Partyline authentication throttling.
# Missing values keep the defaults below. Numeric values outside the supported
# range are clamped safely by Mediabot::Conf.
PARTYLINE_LOGIN_MAX_FAILURES=5
PARTYLINE_LOGIN_IP_MAX_FAILURES=15
PARTYLINE_LOGIN_IP_WINDOW_SECONDS=600
PARTYLINE_LOGIN_IP_MAX_ENTRIES=1024

# Minimum per-channel level allowed to delete another user's quote.
# The quote author and global Administrator+ users remain allowed regardless.
QUOTE_DELETE_CHANNEL_LEVEL=100

# Daily/weekly channel report wall-clock slots in the bot process timezone.
# Weekday follows Perl localtime: 0=Sunday, 1=Monday, ... 6=Saturday.
REPORT_DAILY_HOUR=0
REPORT_DAILY_MINUTE=0
REPORT_WEEKLY_WDAY=1
REPORT_WEEKLY_HOUR=0
REPORT_WEEKLY_MINUTE=0

# Optional DCC CHAT listening port range.
# If unset, Mediabot lets the OS choose an ephemeral port.
# Set this if you want a firewall-friendly DCC range.
#DCC_PORT_MIN=50000
#DCC_PORT_MAX=50100

LANG=en
DEFINE_LANG=en
TRIVIA_TIMEOUT=30
YT_SEARCH_RESULTS=3
# mb397-R1: comma-separated nicks treated as bots by the stats filters
# ("bots"/"nobots" report modes). The bot's own nick is always included.
# Default when absent: only the bot itself.
#BOT_NICKS=
# mb397-R1: path of the achievements definition file.
# Default when absent: var/achievements.json
#ACHIEVEMENTS_PATH=var/achievements.json
[fortnite]
# Optional Fortnite API key.
# Leave empty to disable Fortnite API-backed features.
API_KEY=

[tmdb]
# Optional TMDB API key.
# Leave empty to disable TMDB API-backed features.
API_KEY=

[libera]
# Used only when connection.CONN_NETWORK_TYPE=2.
# NickServ password for Libera-style NickServ authentication.
LIBERA_NICKSERV_PASSWORD=


# OpenAI profile summary:
#   dev     = richer dev answers: temp 0.6, tokens 700, 5 lines, wrap 360
#   compact = shorter answers: temp 0.4, tokens 350, 3 lines, wrap 340
#   safe    = conservative public-channel answers: temp 0.3, tokens 300, 3 lines
#   default = built-in OpenAI/tellme defaults

# OpenAI system prompt note:
#   SYSTEM_PROMPT controls the default behavior/tone of tellme/chatGPT.
#   It can be changed by Owner with: openai set system_prompt <text>
#   The status command only shows system_prompt_len, not the full prompt.

[antiflood]
# Input guard, global per channel.
# Counts all public commands addressed to the bot on a channel, regardless of nick.
# Useful when several users trigger the bot at the same time.
CHANFLOOD_WINDOW=10
CHANFLOOD_MAX_COMMANDS=8
CHANFLOOD_SILENCE=30
CHANFLOOD_NOTIFY_COOLDOWN=60

# Input guard, per nick.
# Sliding-window limiter with a user NOTICE on cooldown.
NICKFLOOD_WINDOW=5
NICKFLOOD_MAX_COMMANDS=5
NICKFLOOD_NOTIFY_COOLDOWN=30
NICKFLOOD_STATE_TTL=120

# Output guard cache/cleanup.
# CHANNEL_FLOOD remains DB-backed for nbmsg_max/duration/timetowait.
# These keys only control memory cache and cleanup behavior.
OUTPUT_PARAMS_CACHE_TTL=60
OUTPUT_STATE_TTL=300
OUTPUT_PARAMS_STATE_TTL=600

# Optional global output guard used by checkAntiFlood() when +AntiFlood is
# enabled on channels. It limits bot output bursts across those protected
# channels to avoid cross-channel floods.
OUTPUT_GLOBAL_WINDOW=10
OUTPUT_GLOBAL_MAX_MSG=20
OUTPUT_GLOBAL_SILENCE=15

[chromium]
# Chromium JavaScript virtual time budget, in milliseconds.
# Accepted range: 1000-30000. Default: 3500.
VIRTUAL_TIME_BUDGET=3500

# Chromium process timeout, in seconds.
# Accepted range: 5-60. Default: 12.
ALARM_TIMEOUT=12

# Facebook/Reels usually needs a bit more time than generic pages.
# Keep this specific to Facebook so other URL handlers stay fast.
FACEBOOK_VIRTUAL_TIME_BUDGET=6500
FACEBOOK_ALARM_TIMEOUT=22

# -----------------------------------------------------------------------------
# Optional trusted plugins and external Perl/Python/Tcl script bridge
# -----------------------------------------------------------------------------
#
# PluginManager loads trusted in-process Perl modules only when AUTOLOAD=1.
# Keep autoload disabled until every configured module has been reviewed.
#
# Mediabot::Plugin::ScriptDryRun is the historical module name. It now routes
# selected public commands to trusted external Perl, Python or Tcl scripts.
# Scripts are resolved below plugins/scripts; ROUTES/SCRIPT values are relative
# paths such as examples/hello_perl.pl. Supported extensions: .pl, .py and .tcl.
# The runner does not use a shell, but these scripts are trusted extensions, not
# a sandbox for untrusted code.
#
# Canonical plugin configuration (disabled by default):
#
#[plugins]
#AUTOLOAD=0
#ENABLED=Mediabot::Plugin::ScriptDryRun
#
#[plugins.ScriptDryRun]
## Safe route-only observation example. ROUTES authorizes the mapped command;
## COMMANDS keeps the intended scope explicit and self-documenting.
#COMMANDS=hello
#ROUTES=hello=examples/hello_perl.pl
#ACTION_MODE=dry-run
#ALLOW_IRC=no
#APPLY_REQUIRE_SCOPE=yes
#
## Optional fallback script (normally leave unset when ROUTES are sufficient):
## SCRIPT=examples/hello_perl.pl
##
## SCRIPT is used when no specific ROUTES entry matches. In dry-run mode an
## unscoped fallback may observe a command but does not own/suppress Mediabot's
## normal dispatcher. In apply mode, APPLY_REQUIRE_SCOPE=yes rejects fallback
## execution unless the current command is explicitly listed in COMMANDS or
## ROUTES. Never combine apply mode with a broad fallback unintentionally.
#
## Full reference set with real IRC output. `roll`, `8ball`, `choose` and `calc`
## already exist as richer built-in commands, so the external examples use conflict-free
## aliases and do not shadow the internal handlers.
#COMMANDS=hello,pyhello,tclhello,proll,p8ball,pchoose,pcalc,premind,pcountdown
#ROUTES=hello=examples/hello_perl.pl, pyhello=examples/hello_python.py, tclhello=examples/hello_tcl.tcl, proll=examples/roll.py, p8ball=examples/eightball.tcl, pchoose=examples/choose.pl, pcalc=examples/calc.py, premind=examples/remind.pl, pcountdown=examples/countdown.py
#ACTION_MODE=apply
#ALLOW_IRC=yes
#APPLY_REQUIRE_SCOPE=yes
#
# Optional channel-event routing (opt-in, no SCRIPT fallback):
#   supported events: join, part, topic, kick;
#   the routed script is re-run with the matching event name and receives
#   channel/nick (+ ident/host, part message, topic or kick victim) in the JSON envelope;
#   the bot's own join/part/topic events never trigger scripts; kick is suppressed
#   when the bot is the kicker or the victim;
#   at most one run per event per channel per cooldown window (anti-burst).
## EVENTS=join=examples/greet.pl, topic=examples/topicwatch.pl, part=examples/partwatch.tcl, kick=examples/kickwatch.pl
## EVENT_COOLDOWN=10
#
# Optional per-route configuration (commands AND events):
#   one CONFIG_<route> key per route, "key=value; key2=value2" (';' separated
#   so values may contain commas); keys are [A-Za-z0-9_.-] (max 64), values
#   are capped at 512 chars, at most 20 keys per route; the validated map is
#   injected into the script envelope as data.config (only when non-empty)
#   and travels with deferred timer runs. CONFIG_ applies to ROUTES/EVENTS
#   entries only: a command served by the SCRIPT fallback has no route name,
#   so its CONFIG_ key would be ignored.
## CONFIG_join=welcome=Bienvenue sur ce canal,
## CONFIG_premind=max_delay=1800
## CONFIG_pcountdown=max_seconds=600
#
# Action behavior:
#   dry-run  = execute script, validate/plan actions, apply nothing;
#   apply    = apply validated log/reply/notice/timer actions;
#   IRC reply/notice additionally requires ALLOW_IRC=yes;
#   timer re-runs the SAME script after <delay> seconds with event "timer";
#   deferred reply/notice pass through the same ALLOW_IRC and channel-scope
#   guards, and a timer-invoked run can never schedule further timers;
#   timers are in-memory only and are cancelled by a restart/plugin reload.
#
# Script protocol:
#   stdin  = one mediabot-script-v1 JSON object;
#   stdout = one JSON object with protocol, ok and actions;
#   supported action types: reply, notice, log, timer.
#
# Partyline visibility (read-only):
#   .plugins
#   .plugins config
#   .scriptdryrun status
#   .scriptdryrun last
#   .scriptdryrun config
#   .scriptdryrun timers
#
# Partyline timer control (cancels armed script timers, never creates any):
#   .scriptdryrun canceltimers
#
# Canonical keys above are preferred. Compatibility aliases still accepted:
#   plugin autoload:
#     plugins.autoload, plugins.ENABLED_AUTOLOAD,
#     PLUGIN_AUTOLOAD, PLUGINS_AUTOLOAD
#   plugin module list:
#     plugins.enabled, plugins.PLUGINS, plugins.plugins,
#     PLUGINS_ENABLED, PLUGIN_ENABLED, PLUGINS
#   ScriptDryRun section aliases:
#     plugins.ScriptDryRun.<KEY>, plugins.script_dryrun.<KEY>
#   flat ScriptDryRun aliases:
#     SCRIPT_DRYRUN_SCRIPT, SCRIPT_DRYRUN_PATH
#     SCRIPT_DRYRUN_COMMANDS, SCRIPT_DRYRUN_ROUTES
#     SCRIPT_DRYRUN_ACTION_MODE, SCRIPT_DRYRUN_ALLOW_IRC
#     SCRIPT_DRYRUN_APPLY_REQUIRE_SCOPE

[anthropic]
# Optional Anthropic Claude API key used by the ai command.
# Leave empty to disable API-backed Claude features.
API_KEY=

API_URL=https://api.anthropic.com/v1/messages
API_VERSION=2023-06-01
MODEL=claude-haiku-4-5-20251001
# Per nick/channel Claude rate limiting.
# Defaults: 5 requests per 60 seconds.
RATE_MAX=5
RATE_WINDOW=60
# Per nick/channel Claude persona TTL, in hours. Default in code: 1.
PERSONA_TTL_HOURS=1
# mb397-R1: sampling temperature for the ai command (0.0 = deterministic,
# 1.0 = creative). Clamped to 0..1 in code. Default when absent: 1.0.
#TEMPERATURE=1.0
MAX_TOKENS=400
MAX_PRIVMSG=4
WRAP_BYTES=400
SLEEP_US=750000
SYSTEM_PROMPT=You are a helpful IRC assistant. Be concise.